# Configuration file for <https://github.com/sapcc/go-makefile-maker>

metadata:
  url: https://github.com/sapcc/disco

binaries:
  - name:        disco
    fromPackage: ./
    installTo:   bin/

dockerfile:
  enabled: false

golang:
  setGoModVersion: false
  ldflags:
    "-X github.com/sapcc/disco/pkg/version.GitBranch": GIT_BRANCH
    "-X github.com/sapcc/disco/pkg/version.GitCommit": GIT_COMMIT
    "-X github.com/sapcc/disco/pkg/version.GitState":  GIT_STATE
    "-X github.com/sapcc/disco/pkg/version.BuildDate": BUILD_DATE

variables:
  GIT_BRANCH: $(shell git rev-parse --abbrev-ref HEAD)
  GIT_COMMIT: $(shell git rev-parse --short HEAD)
  GIT_STATE:  $(shell if git diff --quiet; then echo clean; else echo dirty; fi)
  BUILD_DATE: $(shell date -u +"%Y-%m-%dT%H:%M:%SZ")

controllerGen:
  crdOutputPath: deploy/kustomize/config/crd/bases
  rbacRoleName:  manager-role

golangciLint:
  createConfig: true

goReleaser:
  createConfig: true
  binaryName: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
  format: .tar.gz
  nameTemplate: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

githubWorkflow:
  ci:
    enabled: true
  pushContainerToGhcr:
    enabled: true
    platforms: "linux/amd64,linux/arm64"
    tagStrategy:
      - edge
      - latest
      - semver
      - sha
  securityChecks:
    enabled: true
  license:
    enabled: false
  release:
    enabled: true

makefile:
  enabled: true

renovate:
  enabled: true
  assignees:
    - kengou
    - abhijith-darshan
  customManagers:
    - customType: "regex"
      description: "Bump envtest version in the Makefile"
      fileMatch: [
        "^Makefile$"
      ]
      matchStrings: [
        "ENVTEST_K8S_VERSION\\s*\\?=\\s*(?<currentValue>.?(?:\\d+\\.){0,2}\\d+)"
      ]
      datasourceTemplate: "github-tags"
      depNameTemplate: "kubernetes-sigs/controller-tools"
      extractVersionTemplate: "^envtest.v(?<version>.*)$"
    - customType: "regex"
      description: "Bump kustomize version in the Makefile"
      fileMatch: [
        "^Makefile$"
      ]
      matchStrings: [
        "KUSTOMIZE_VERSION\\s*\\?=\\s*(?<currentValue>.?(?:\\d+\\.){0,2}\\d+)"
      ]
      datasourceTemplate: "github-tags"
      depNameTemplate: "kubernetes-sigs/kustomize"
      extractVersionTemplate: "^kustomize/v(?<version>.*)$"
    - customType: "regex"
      description: "Bump controller tools version in the Makefile"
      fileMatch: [
        "^Makefile$"
      ]
      matchStrings: [
        "CONTROLLER_TOOLS_VERSION\\s*\\?=\\s*(?<currentValue>.?(?:\\d+\\.){0,2}\\d+)"
      ]
      datasourceTemplate: "github-tags"
      depNameTemplate: "kubernetes-sigs/controller-tools"
      extractVersionTemplate: "^v(?<version>.*)$"
  packageRules:
    - matchPackageNames: [
        "github-actions"
      ]
      groupName: "github actions"
      matchUpdateTypes:
        - major
        - minor
        - patch
      minimumReleaseAge: "14 days"
      extends:
        - "helpers:pinGitHubActionDigests"

verbatim: |
  # Image URL to use all building/pushing image targets
  IMG_REPO ?= ghcr.io/sapcc/disco
  IMG_TAG ?= latest
  IMG ?= ${IMG_REPO}:${IMG_TAG}

  # ENVTEST_K8S_VERSION refers to the version of kubebuilder assets to be downloaded by envtest binary.
  ENVTEST_K8S_VERSION = 1.28
  ## Tool Versions
  KUSTOMIZE_VERSION ?= 5.6.0
  CONTROLLER_TOOLS_VERSION ?= 0.18.0

  OS := $(shell go env GOOS)

  KUSTOMIZE_INSTALL_SCRIPT ?= "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh"
  .PHONY: kustomize
  kustomize: ## Download kustomize locally if necessary.
  	@test -f $(shell go env GOPATH)/bin/kustomize || (curl -s $(KUSTOMIZE_INSTALL_SCRIPT) | bash -s -- $(subst v,,$(KUSTOMIZE_VERSION)) $(shell go env GOPATH)/bin)

  .PHONY: manifests
  manifests: ## Generate WebhookConfiguration, ClusterRole and CustomResourceDefinition objects.
  	controller-gen rbac:roleName=manager-role crd webhook paths="./..." output:crd:artifacts:config=deploy/kustomize/config/crd/bases output:rbac:artifacts:config=deploy/kustomize/config/rbac output:webhook:artifacts:config=deploy/kustomize/config/webhook

  .PHONY: fmt
  fmt: ## Run go fmt against code.
  	go fmt ./...

  .PHONY: vet
  vet: ## Run go vet against code.
  	go vet ./...

  .PHONY: test
  test: manifests generate fmt vet ## Run tests.
  	KUBEBUILDER_ASSETS="$(shell setup-envtest use $(ENVTEST_K8S_VERSION) -p path)" go test ./... -coverprofile cover.out

  .PHONY: build-local
  build-local: ## Build binary locally to bin/<OS>/disco.
  	@mkdir -p bin/$(OS)
  	go build -mod=readonly -ldflags "-s -w $(GO_LDFLAGS)" -o bin/$(OS)/disco main.go

  .PHONY: run
  run: manifests generate fmt vet ## Run a controller from your host.
  	go run ./main.go

  .PHONY: docker-build
  docker-build: GIT_COMMIT  = $(shell git rev-parse --short HEAD)
  docker-build: test ## Build docker image with the manager.
  	docker build --network=host -t ${IMG_REPO}:${GIT_COMMIT} .

  .PHONY: docker-push-mac
  docker-push-mac: GIT_COMMIT  = $(shell git rev-parse --short HEAD)
  docker-push-mac: test ## Build docker image with the manager.
  	docker buildx build --platform linux/amd64 -t ${IMG_REPO}:${GIT_COMMIT} . --push

  .PHONY: docker-push
  docker-push: GIT_COMMIT  = $(shell git rev-parse --short HEAD)
  docker-push: ## Push docker image with the manager.
  	docker push ${IMG_REPO}:${GIT_COMMIT}
  	docker tag ${IMG_REPO}:${GIT_COMMIT} ${IMG_REPO}:latest && docker push ${IMG_REPO}:latest

  ifndef ignore-not-found
    ignore-not-found = false
  endif

  .PHONY: install-crd
  install-crd: manifests kustomize ## Install CRDs into the K8s cluster specified in ~/.kube/config.
  	kustomize build deploy/kustomize/config/crd | kubectl apply -f -

  .PHONY: uninstall-crd
  uninstall-crd: manifests kustomize ## Uninstall CRDs from the K8s cluster specified in ~/.kube/config.
  	kustomize build deploy/kustomize/config/crd | kubectl delete --ignore-not-found=$(ignore-not-found) -f -

  .PHONY: deploy
  deploy: manifests kustomize ## Deploy controller to the K8s cluster specified in ~/.kube/config.
  	cd deploy/kustomize/config/manager && kustomize edit set image controller=${IMG}
  	kustomize build deploy/kustomize/config/default | kubectl apply -f -

  .PHONY: undeploy
  undeploy: ## Undeploy controller from the K8s cluster specified in ~/.kube/config.
  	kustomize build deploy/kustomize/config/default | kubectl delete --ignore-not-found=$(ignore-not-found) -f -

  .PHONY: generate-helm-chart
  generate-helm-chart: manifests kustomize
  	cd deploy/kustomize/config/manager && kustomize edit set image controller=${IMG}
  	kustomize build deploy/kustomize/config/default | go run ./hack/kustomize-to-helm.go --out=deploy/helm-chart
